<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        :root { 
            --accent: #1DB954; 
            --bg: #0a0a0a; 
            --card: rgba(0, 0, 0, 0); 
            --text: #ffffff; 
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            position: relative;
        }

        .bg-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            filter: blur(12px) brightness(0.5);
            transform: scale(1.05); 
            z-index: -1;
            transition: opacity 0.5s ease-in-out;
        }

        #bg-old { opacity: 1; }
        #bg-new { opacity: 0; }

        @keyframes rain {
            from { transform: translateY(-100%); }
            to { transform: translateY(100%); }
        }
        @keyframes snow {
            0%   { transform: translateY(-100%) translateX(0); }
            50%  { transform: translateY(0%) translateX(15px); }
            100% { transform: translateY(100%) translateX(0); }
        }
        .weather-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            display: none;
        }
        .rain-active {
            display: block;
            background: repeating-linear-gradient(transparent, transparent 95%, rgba(255,255,255,0.1) 100%);
            background-size: 2px 80px;
            animation: rain 0.6s linear infinite;
        }
        .snow-active {
            display: block;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 1px, transparent 1px);
            background-size: 30px 30px;
            animation: snow 3s linear infinite;
        }

        .dashboard { 
            display: flex; 
            gap: 40px; 
            width: 950px; 
            height: 420px; 
            transform: scale(0.95); 
            transform-origin: center;
            z-index: 1;
        }

        .card { 
            background: var(--card); 
            border: none; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        .spotify-card { 
            flex: 0 0 350px; 
            text-align: center; 
            justify-content: center; 
        }

        .art-container {
            width: 280px; 
            height: 280px; 
            margin: 0 auto;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(255,255,255,0.1);
        }



        #album-art, #album-art-new { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: opacity 0.5s ease-in-out;
        }

        #album-art-new { opacity: 0; z-index: 2; }

        .music-info { 
            margin-top: 20px;
            display: flex; 
            flex-direction: column; 
            gap: 4px;
            width: 320px; 
            margin-left: auto;
            margin-right: auto;
            overflow: hidden;
        }

        .scroll-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            padding: 0 20px; 
            box-sizing: border-box;
            mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
        }

        #track { font-size: 1.7rem; font-weight: 800; display: inline-block; }
        #artist { font-size: 1.3rem; font-weight: 600; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: calc(100% - 40px); margin: 0 auto; display: block; }

        .scrolling { animation: bounce linear infinite; }

        @keyframes bounce {
            0%, 20% { transform: translateX(0); }
            40%, 60% { transform: translateX(var(--scroll-dist)); }
            80%, 100% { transform: translateX(0); }
        }

        @keyframes wander {
            0%   { transform: translate(0px, 0px); }
            25%  { transform: translate(4px, -6px); }
            50%  { transform: translate(-3px, -10px); }
            75%  { transform: translate(3px, -4px); }
            100% { transform: translate(0px, 0px); }
        }
        .float-icon { display: inline-block; animation: wander 8s infinite cubic-bezier(0.45, 0.05, 0.55, 0.95); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .weather-card { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-around; 
            align-items: center;
            padding: 10px 0;
        }
        
        .location { font-size: 2rem; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; color: rgba(255,255,255,0.6); text-align: center; width: 100%; }
        
        .main-row { display: flex; align-items: baseline; justify-content: center; gap: 60px; width: 100%; }
        
        .clock-container { font-size: 4.8rem; font-weight: 600; letter-spacing: -2px; line-height: 1; display: flex; flex-direction: column; align-items: center; position: relative; }

        .temp-main { 
            font-size: 4.8rem; 
            font-weight: 600; 
            letter-spacing: -2px; 
            line-height: 1; 
            display: flex; 
            overflow: hidden;
            height: 1.1em;
        }
        .temp-digit { transition: transform 0.6s cubic-bezier(0.45, 0.05, 0.55, 0.95); }

        .am-pm { font-size: 1.1rem; color: rgba(255,255,255,0.5); font-weight: 800; position: absolute; top: 100%; margin-top: 2px; text-transform: uppercase; }

        .weather-group { display: flex; align-items: center; gap: 15px; }
        #main-weather-icon { font-size: 2.6rem; }

        .forecast-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 90%; }
        .f-item { text-align: center; opacity: 0; animation: fadeInUp 0.5s ease forwards; }
        .f-time { font-size: 1rem; color: rgba(255,255,255,0.5); font-weight: 800; text-transform: uppercase; }
        .f-icon { font-size: 2.2rem; margin: 8px 0; display: block; }
        .f-temp { font-size: 1.4rem; font-weight: 700; }
    </style>
</head>

yeWP3Tv8OnpE86fv1z/AgIAOw==" alt="Loading" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:140px;height:140px;opacity:0.8;">
                <img id="album-art" src="" alt="" style="opacity:0;">
                <img id="album-art-new" src="" alt="">
            </div>
            <div class="music-info">
                <div class="scroll-container">
                    <div id="track">Waiting...</div>
                </div>
                <div id="artist">Start Spotify</div>
            </div>
        </div>

        <div class="card weather-card">
            <div class="location" id="location-label">Loading...</div>
            <div id="save-hint" style="font-size:0.85em;opacity:0.65;text-align:center;margin-top:-4px;letter-spacing:0.03em;">tap Save in settings to load weather</div>
            <div class="main-row">
                <div class="clock-container">
                    <span id="clock-time">--:--</span>
                    <span id="clock-period" class="am-pm">--</span>
                </div>
                <div class="weather-group">
                    <div id="temp" class="temp-main">--°</div>
                    <div id="main-weather-icon">--</div>
                </div>
            </div>
            <div class="forecast-grid" id="forecast-container"></div>
        </div>
    </div>

    <script>
    let currentAlbumArtUrl = "";

    // ── Clock ──────────────────────────────────────────────────────────────
    function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        document.getElementById('clock-time').innerText = `${hours}:${minutes}`;
        document.getElementById('clock-period').innerText = ampm;
    }

    // ── Weather helpers ────────────────────────────────────────────────────
    function getWeatherIcon(code, isDay) {
        switch(code) {
            case 0:   return isDay ? '☀️' : '🌙';       // Clear sky
            case 1:   return isDay ? '🌤️' : '🌙';       // Mainly clear
            case 2:   return isDay ? '⛅' : '☁️';        // Partly cloudy
            case 3:   return '☁️';                        // Overcast
            case 45:
            case 48:  return '🌫️';                       // Fog / rime fog
            case 51:  return '🌦️';                       // Light drizzle
            case 53:  return '🌧️';                       // Moderate drizzle
            case 55:  return '🌧️';                       // Dense drizzle
            case 56:
            case 57:  return '🌨️';                       // Freezing drizzle
            case 61:  return '🌦️';                       // Slight rain
            case 63:  return '🌧️';                       // Moderate rain
            case 65:  return '🌧️';                       // Heavy rain
            case 66:
            case 67:  return '🌨️';                       // Freezing rain
            case 71:  return '🌨️';                       // Slight snow
            case 73:  return '❄️';                        // Moderate snow
            case 75:  return '❄️';                        // Heavy snow
            case 77:  return '🌨️';                       // Snow grains
            case 80:  return isDay ? '🌦️' : '🌧️';      // Slight showers
            case 81:  return '🌧️';                       // Moderate showers
            case 82:  return '🌧️';                       // Violent showers
            case 85:  return '🌨️';                       // Slight snow showers
            case 86:  return '❄️';                        // Heavy snow showers
            case 95:  return '⛈️';                       // Thunderstorm
            case 96:
            case 99:  return '⛈️';                       // Thunderstorm with hail
            default:  return '☁️';
        }
    }

    function isSnow(code) { return (code >= 71 && code <= 77) || (code >= 85 && code <= 86); }
    function isRain(code) { return (code >= 51 && code <= 67) || (code >= 80 && code <= 82); }

    function updateTempDisplay(temp, unit) {
        const tempStr = Math.round(temp).toString();
        const container = document.getElementById('temp');
        container.innerHTML = '';
        [...tempStr].forEach(num => {
            const digit = document.createElement('div');
            digit.className = 'temp-digit';
            digit.innerText = num;
            container.appendChild(digit);
        });
        const deg = document.createElement('div');
        deg.innerText = unit === 'c' ? '°C' : '°';
        container.appendChild(deg);
    }

    // ── Weather fetch ──────────────────────────────────────────────────────
    function renderWeather(payload) {
        try {
            const { city_name, temperature, weather_code, is_day, forecast, temp_unit } = payload;

            document.querySelector('.location').innerText = city_name || '';
            const hint = document.getElementById('save-hint');
            if (hint) hint.style.display = 'none';

            const unitLabel = temp_unit === 'c' ? '°C' : '°F';

            const mainIcon = document.getElementById('main-weather-icon');
            mainIcon.innerText = getWeatherIcon(weather_code, is_day);
            if (weather_code <= 3) mainIcon.classList.add('float-icon');
            else mainIcon.classList.remove('float-icon');

            const rainLayer = document.getElementById('rain-layer');
            rainLayer.classList.remove('rain-active', 'snow-active');
            if (isRain(weather_code))      rainLayer.classList.add('rain-active');
            else if (isSnow(weather_code)) rainLayer.classList.add('snow-active');

            updateTempDisplay(temperature, temp_unit);

            let html = '';
            (forecast || []).forEach((f, i) => {
                const fDay = f.hour >= 6 && f.hour < 18;
                html += `<div class="f-item" style="animation-delay:${(i+1) * 0.1}s">
                            <div class="f-time">${f.hour % 12 || 12}${f.hour >= 12 ? 'PM' : 'AM'}</div>
                            <span class="f-icon">${getWeatherIcon(f.weather_code, fDay)}</span>
                            <div class="f-temp">${Math.round(f.temperature)}°</div>
                         </div>`;
            });
            document.getElementById('forecast-container').innerHTML = html;
        } catch (e) { console.error('renderWeather failed:', e); }
    }

    // ── Scroll bounce for long track names ────────────────────────────────
    function applyBounceEffect(elementId) {
        const el = document.getElementById(elementId);
        const container = el.parentElement;
        el.classList.remove('scrolling');
        el.style.transform = 'translateX(0)';
        setTimeout(() => {
            const scrollWidth = el.scrollWidth;
            const containerWidth = container.offsetWidth - 40;
            if (scrollWidth > containerWidth) {
                const diff = containerWidth - scrollWidth;
                el.style.setProperty('--scroll-dist', `${diff}px`);
                const movementTime = Math.abs(diff) / 40;
                const totalCycle = (movementTime * 2) + 10;
                el.style.animationDuration = `${totalCycle}s`;
                el.classList.add('scrolling');
            }
        }, 200);
    }

    // ── DeskThing Communications ───────────────────────────────────────────
    // The server fetches weather and pushes it via DeskThing.sendDataToClient().
    // That comes through the WebSocket as {type:"weather_data", payload:{...}}.
    // Music data arrives via postMessage from the DeskThing host.

    function handleMusicData(data) {
        if (!data || !data.track_name) return;
        const trackEl = document.getElementById('track');
        if (trackEl.innerText === data.track_name) return;

        trackEl.innerText = data.track_name;
        document.getElementById('artist').innerText = data.artist || '';
        applyBounceEffect('track');

        setTimeout(() => {
            if (data.thumbnail && data.thumbnail !== currentAlbumArtUrl) {
                currentAlbumArtUrl = data.thumbnail;
                const oldArt = document.getElementById('album-art');
                const newArt = document.getElementById('album-art-new');
                const oldBg  = document.getElementById('bg-old');
                const newBg  = document.getElementById('bg-new');

                newArt.src = data.thumbnail;
                newBg.style.backgroundImage = `url('${data.thumbnail}')`;

                newArt.onload = () => {
                    document.getElementById('album-art-placeholder').style.display = 'none';
                    newArt.style.opacity = '1';
                    newBg.style.opacity = '1';
                    setTimeout(() => {
                        oldArt.src = data.thumbnail;
                        oldArt.style.opacity = '1';
                        newArt.style.opacity = '0';
                        oldBg.style.backgroundImage = `url('${data.thumbnail}')`;
                        newBg.style.opacity = '0';
                    }, 500);
                };
            }
        }, 100);
    }

    // DeskThing communication via postMessage (iframe API)
    function sendToServer(type, request, payload) {
        window.parent.postMessage({
            type: "IFRAME_ACTION",
            payload: { app: "client", type, request: request || null, payload: payload || null }
        }, "*");
    }

    window.addEventListener("message", (event) => {
        const msg = event.data;
        if (!msg || msg.source !== "deskthing") return;

        // Music
        if (msg.type === "music") handleMusicData(msg.payload);
        if (msg.type === "app_payload" && msg.payload?.type === "music") handleMusicData(msg.payload.payload);

        // Weather — DeskThing delivers our server's sendToClient() calls as app_payload
        if (msg.type === "app_payload" && msg.payload?.type === "weather_data" && msg.payload?.payload) {
            renderWeather(msg.payload.payload);
        }
        // Also handle if DeskThing delivers it unwrapped
        if (msg.type === "weather_data" && msg.payload) {
            renderWeather(msg.payload);
        }
    });

    // Request weather data from server on load
    function requestWeather() {
        sendToServer("get", "weather_data");
    }

    // ── Init ───────────────────────────────────────────────────────────────
    updateClock();
    setInterval(updateClock, 1000);
    // Request weather once DeskThing is ready (small delay for iframe init)
    setTimeout(requestWeather, 500);
    </script>
